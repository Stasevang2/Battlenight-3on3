<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  
  <!-- Baggrund skygge -->
  <ellipse cx="200" cy="410" rx="160" ry="12" fill="rgba(0,0,0,0.2)"/>
  
  <!-- Ydre ring - rød -->
  <circle cx="200" cy="220" r="175" fill="#CC0000"/>
  
  <!-- Midtre ring - hvid -->
  <circle cx="200" cy="220" r="163" fill="#FFFFFF"/>
  
  <!-- Indre cirkel - mørkeblå -->
  <circle cx="200" cy="220" r="152" fill="#003087"/>

  <!-- HALS -->
  <rect x="172" y="320" width="56" height="40" rx="8" fill="#F4C896"/>
  
  <!-- TRØJE top -->
  <path d="M140 355 Q200 345 260 355 L275 400 H125 Z" fill="#CC0000"/>
  <!-- Trøje hvid stribe -->
  <path d="M145 375 Q200 368 255 375 L258 385 Q200 378 142 385 Z" fill="#FFFFFF"/>

  <!-- HOVED -->
  <ellipse cx="200" cy="280" rx="72" ry="78" fill="#F4C896"/>
  
  <!-- Hage -->
  <ellipse cx="200" cy="348" rx="38" ry="18" fill="#F4C896"/>
  
  <!-- ØRE venstre -->
  <ellipse cx="130" cy="278" rx="16" ry="20" fill="#F4C896"/>
  <ellipse cx="132" cy="278" rx="9" ry="13" fill="#E8A070"/>
  
  <!-- ØRE højre -->
  <ellipse cx="270" cy="278" rx="16" ry="20" fill="#F4C896"/>
  <ellipse cx="268" cy="278" rx="9" ry="13" fill="#E8A070"/>

  <!-- HJELM -->
  <path d="M132 260 Q135 190 200 185 Q265 190 268 260 L255 258 Q250 205 200 200 Q150 205 145 258 Z" fill="#CC0000"/>
  <!-- Hjelm skygge -->
  <path d="M132 260 Q135 220 200 215 Q265 220 268 260 L258 258 Q255 225 200 220 Q145 225 142 258 Z" fill="#AA0000"/>
  <!-- Hjelm kant -->
  <path d="M128 262 Q128 255 200 252 Q272 255 272 262 L265 265 Q265 260 200 258 Q135 260 135 265 Z" fill="#CC0000"/>
  <!-- Hjelm streger -->
  <line x1="178" y1="188" x2="172" y2="258" stroke="#AA0000" stroke-width="3"/>
  <line x1="200" y1="185" x2="200" y2="257" stroke="#AA0000" stroke-width="3"/>
  <line x1="222" y1="188" x2="228" y2="258" stroke="#AA0000" stroke-width="3"/>

  <!-- ANSIGT -->
  
  <!-- Øjenbryn venstre - hævet/sjov -->
  <path d="M158 258 Q175 248 188 255" stroke="#5C3A1E" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Øjenbryn højre - normal -->
  <path d="M212 255 Q225 248 242 255" stroke="#5C3A1E" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ØJE venstre - knipset -->
  <path d="M158 268 Q173 260 188 268" stroke="#5C3A1E" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  
  <!-- ØJE højre -->
  <ellipse cx="227" cy="270" rx="16" ry="14" fill="white"/>
  <ellipse cx="229" cy="271" rx="9" ry="9" fill="#3A2010"/>
  <ellipse cx="231" cy="269" rx="3" ry="3" fill="white"/>

  <!-- NÆSE -->
  <ellipse cx="200" cy="295" rx="12" ry="8" fill="#E8A070"/>
  <circle cx="195" cy="296" r="4" fill="#C87850"/>
  <circle cx="205" cy="296" r="4" fill="#C87850"/>

  <!-- MUD - stort smil med tænder -->
  <path d="M168 318 Q200 345 232 318" fill="#CC0000"/>
  <!-- Tænder -->
  <path d="M172 320 Q200 342 228 320 Q228 330 200 335 Q172 330 172 320" fill="white"/>
  <!-- Tandmellemrum -->
  <line x1="200" y1="320" x2="200" y2="334" stroke="#DDDDDD" stroke-width="2"/>
  <line x1="186" y1="320" x2="185" y2="333" stroke="#DDDDDD" stroke-width="2"/>
  <line x1="214" y1="320" x2="215" y2="333" stroke="#DDDDDD" stroke-width="2"/>
  <!-- Underlæbe -->
  <path d="M175 335 Q200 348 225 335" stroke="#C87850" stroke-width="2.5" fill="none"/>

  <!-- Kinder rødme -->
  <ellipse cx="158" cy="308" rx="18" ry="10" fill="rgba(220,100,80,0.3)"/>
  <ellipse cx="242" cy="308" rx="18" ry="10" fill="rgba(220,100,80,0.3)"/>

  <!-- ISHOCKEY STAV - over skulder -->
  <rect x="248" y="190" width="8" height="120" rx="4" fill="#F5DEB3" transform="rotate(25, 252, 250)"/>
  <rect x="255" y="285" width="35" height="12" rx="4" fill="#F5DEB3" transform="rotate(25, 252, 290)"/>

  <!-- ======= TEKST OVENOVER - buet "3on3" ======= -->
  
  <!-- Hvid outline/baggrund til tekst ovenover -->
  <path id="topArc" d="M 58 200 A 150 150 0 0 1 342 200" fill="none"/>
  
  <!-- Stor boble baggrund til "3on3" tekst -->
  <path d="M55 185 Q60 100 200 65 Q340 100 345 185 Q340 145 200 115 Q60 145 55 185 Z" 
        fill="#003087" stroke="#FFFFFF" stroke-width="6"/>
  
  <!-- "3on3" tekst -->
  <text font-family="Arial Black, Arial" font-weight="900" font-size="68" fill="white" 
        stroke="#CC0000" stroke-width="4" paint-order="stroke"
        text-anchor="middle" x="200" y="158" letter-spacing="2">
    3on3
  </text>

  <!-- ======= TEKST NEDENUNDER - buet "RUNGSTED BATTLE" ======= -->
  
  <!-- Buet tekst nedenunder -->
  <path id="bottomArc" d="M 68 320 A 140 140 0 0 0 332 320" fill="none"/>
  
  <text font-family="Arial Black, Arial" font-weight="900" font-size="28" 
        fill="white" stroke="#003087" stroke-width="3" paint-order="stroke"
        text-anchor="middle">
    <textPath href="#bottomArc" startOffset="50%">RUNGSTED BATTLE</textPath>
  </text>

  <!-- Dekorative stjerner/is krystaller -->
  <text x="72" y="230" font-size="22" fill="white" opacity="0.8">❄</text>
  <text x="308" y="230" font-size="22" fill="white" opacity="0.8">❄</text>

</svg>